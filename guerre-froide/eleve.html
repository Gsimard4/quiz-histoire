<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Guerre froide — Quiz</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:  #1a6b6b;
    --accent2: #0d4f4f;
    --coral:   #ff6847;
    --dark:    #0d0d0d;
    --mid:     #1a1a1a;
    --card:    #1e1e1e;
    --border:  #2e2e2e;
    --text:    #f0ece4;
    --muted:   #777;
    --gold:    #f39c12;
    --A: #c0392b; --B: #2471a3; --C: #1e8449; --D: #7d3c98;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body { font-family:'Barlow',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

  header { padding:14px 20px; background:var(--mid); border-bottom:3px solid var(--accent); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .header-title { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:3px; }
  .header-title span { color:var(--coral); }
  #score-badge { font-family:'Barlow Condensed',sans-serif; font-size:1rem; font-weight:700; color:var(--gold); letter-spacing:1px; }

  .screen { display:none; flex:1; padding:20px; flex-direction:column; }
  .screen.active { display:flex; }

  /* JOIN */
  #screen-join { align-items:center; justify-content:center; gap:20px; text-align:center; }
  .join-logo { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; letter-spacing:4px; line-height:1; }
  .join-logo span { color:var(--coral); }
  .join-sub { font-family:'Barlow Condensed',sans-serif; font-size:.85rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  #name-input { width:100%; max-width:320px; padding:14px 16px; font-size:1rem; font-family:'Barlow',sans-serif; background:var(--card); border:1px solid var(--border); border-radius:4px; color:var(--text); outline:none; text-align:center; transition:border-color .2s; }
  #name-input:focus { border-color:var(--accent); }
  #name-input::placeholder { color:var(--muted); }
  #btn-join { width:100%; max-width:320px; padding:14px; font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:2px; background:var(--coral); color:white; border:none; border-radius:4px; cursor:pointer; transition:filter .2s; }
  #btn-join:hover { filter:brightness(1.15); }
  .error-msg { color:var(--coral); font-size:.82rem; min-height:18px; }

  /* WAITING */
  #screen-waiting { align-items:center; justify-content:center; gap:16px; text-align:center; }
  .wait-icon { font-size:2.5rem; animation:spin 3s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg);} }
  #screen-waiting h2 { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:3px; color:var(--accent); }
  #waiting-name { font-family:'Barlow Condensed',sans-serif; font-size:1rem; color:var(--gold); letter-spacing:1px; }
  #screen-waiting p { font-family:'Barlow Condensed',sans-serif; font-size:.85rem; letter-spacing:1px; color:var(--muted); text-transform:uppercase; }

  /* QUESTION */
  #screen-question { gap:12px; }
  .q-progress { font-family:'Barlow Condensed',sans-serif; font-size:.85rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; text-align:center; }
  .timer-track { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
  #timer-fill-e { height:100%; background:linear-gradient(90deg,var(--accent),var(--coral)); transition:width 1s linear; border-radius:3px; }
  #q-text-e { background:var(--card); border-left:4px solid var(--coral); padding:14px 16px; border-radius:0 6px 6px 0; font-size:1rem; font-weight:700; line-height:1.5; flex-shrink:0; }

  .answers-stack { display:flex; flex-direction:column; gap:8px; flex:1; justify-content:center; }
  .ans-btn { display:flex; align-items:center; gap:12px; padding:14px 16px; background:var(--card); border:1px solid var(--border); border-radius:6px; cursor:pointer; font-family:'Barlow',sans-serif; font-size:.95rem; font-weight:600; color:var(--text); text-align:left; transition:filter .15s; }
  .ans-btn:active { filter:brightness(1.2); transform:scale(.98); }
  .ans-btn .letter { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; flex-shrink:0; width:26px; text-align:center; line-height:1; }
  .ans-btn[data-idx="0"] { border-left:4px solid var(--A); }
  .ans-btn[data-idx="1"] { border-left:4px solid var(--B); }
  .ans-btn[data-idx="2"] { border-left:4px solid var(--C); }
  .ans-btn[data-idx="3"] { border-left:4px solid var(--D); }
  .ans-btn[data-idx="0"] .letter { color:var(--A); }
  .ans-btn[data-idx="1"] .letter { color:var(--B); }
  .ans-btn[data-idx="2"] .letter { color:var(--C); }
  .ans-btn[data-idx="3"] .letter { color:var(--D); }
  .ans-btn.selected { opacity:.75; }
  .ans-btn.correct { background:#0d2010; border-color:var(--C) !important; }
  .ans-btn.wrong   { background:#200d0d; border-color:var(--A) !important; opacity:.55; }

  /* RESULT */
  #screen-result { align-items:center; justify-content:center; gap:16px; text-align:center; }
  .result-icon { font-size:3.5rem; animation:pop .35s ease; }
  @keyframes pop { from{transform:scale(0);opacity:0;} 70%{transform:scale(1.15);} to{transform:scale(1);opacity:1;} }
  #result-label { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:3px; }
  #result-label.correct { color:#1e8449; }
  #result-label.wrong   { color:var(--A); }
  #result-pts { font-family:'Barlow Condensed',sans-serif; font-size:1.2rem; font-weight:700; color:var(--gold); letter-spacing:1px; }
  #result-total { font-family:'Barlow Condensed',sans-serif; font-size:.9rem; color:var(--muted); letter-spacing:1px; }
  .waiting-label { font-family:'Barlow Condensed',sans-serif; font-size:.82rem; letter-spacing:1px; color:var(--muted); text-transform:uppercase; animation:blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1;}50%{opacity:.25;} }

  /* LEADERBOARD */
  #screen-lb { gap:14px; }
  #screen-lb h2 { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:3px; color:var(--accent); text-align:center; }
  .lb-row { display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--card); border:1px solid var(--border); border-left:3px solid var(--border); border-radius:5px; }
  .lb-row.me { border-left-color:var(--gold); background:#1e1a0d; }
  .lb-row:nth-child(1){border-left-color:#f1c40f;}
  .lb-row:nth-child(2){border-left-color:#bdc3c7;}
  .lb-row:nth-child(3){border-left-color:#ca6f1e;}
  .lb-rank { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; color:var(--gold); min-width:26px; }
  .lb-name { flex:1; font-weight:600; font-size:.9rem; }
  .lb-score { font-family:'Barlow Condensed',sans-serif; font-size:.95rem; font-weight:700; color:var(--coral); letter-spacing:1px; }

  /* PODIUM */
  #screen-podium { align-items:center; gap:16px; text-align:center; }
  #screen-podium h2 { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:4px; color:var(--gold); }
  .my-result { background:var(--card); border:1px solid var(--accent); border-radius:8px; padding:20px; width:100%; }
  .my-rank-num { font-family:'Bebas Neue',sans-serif; font-size:3.5rem; color:var(--gold); line-height:1; }
  .my-rank-label { font-family:'Barlow Condensed',sans-serif; font-size:.85rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  .my-final-pts { font-family:'Barlow Condensed',sans-serif; font-size:1.2rem; font-weight:700; color:var(--coral); margin-top:6px; letter-spacing:1px; }
</style>
</head>
<body>

<header>
  <div class="header-title">GUERRE <span>FROIDE</span></div>
  <div id="score-badge">0 pts</div>
</header>

<!-- JOIN -->
<div id="screen-join" class="screen active">
  <div>
    <div class="join-logo">QUIZ <span>HISTOIRE</span></div>
    <div class="join-sub">La Guerre froide</div>
  </div>
  <input id="name-input" type="text" maxlength="20" placeholder="Ton prénom…" autocomplete="off" autocorrect="off" spellcheck="false">
  <div class="error-msg" id="error-msg"></div>
  <button id="btn-join">REJOINDRE</button>
</div>

<!-- WAITING -->
<div id="screen-waiting" class="screen">
  <div class="wait-icon">⏳</div>
  <h2>EN ATTENTE</h2>
  <div id="waiting-name"></div>
  <p>Le prof va bientôt lancer le quiz</p>
</div>

<!-- QUESTION -->
<div id="screen-question" class="screen">
  <div class="q-progress" id="q-prog">Question 1/10</div>
  <div class="timer-track"><div id="timer-fill-e" style="width:100%"></div></div>
  <div id="q-text-e">—</div>
  <div class="answers-stack" id="ans-stack">
    <button class="ans-btn" data-idx="0"><span class="letter">A</span><span id="e-ans-0">—</span></button>
    <button class="ans-btn" data-idx="1"><span class="letter">B</span><span id="e-ans-1">—</span></button>
    <button class="ans-btn" data-idx="2"><span class="letter">C</span><span id="e-ans-2">—</span></button>
    <button class="ans-btn" data-idx="3"><span class="letter">D</span><span id="e-ans-3">—</span></button>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div class="result-icon" id="result-icon">—</div>
  <div id="result-label">—</div>
  <div id="result-pts">—</div>
  <div id="result-total">—</div>
  <div class="waiting-label">En attente du classement…</div>
</div>

<!-- LEADERBOARD -->
<div id="screen-lb" class="screen">
  <h2>CLASSEMENT</h2>
  <div id="lb-e-list"></div>
  <div class="waiting-label" style="text-align:center;margin-top:8px;">En attente de la prochaine question…</div>
</div>

<!-- PODIUM -->
<div id="screen-podium" class="screen">
  <h2>🏆 FIN DU QUIZ</h2>
  <div class="my-result">
    <div class="my-rank-label">Ta position</div>
    <div class="my-rank-num" id="my-rank">—</div>
    <div class="my-rank-label">sur <span id="total-p">?</span> joueurs</div>
    <div class="my-final-pts" id="my-pts">—</div>
  </div>
  <div id="lb-final-e" style="width:100%"></div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://guerre-froide-bc2fb-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const QUESTIONS = [
  { q:"Pourquoi les vainqueurs de la 2e Guerre mondiale ne s'entendent-ils pas sur l'avenir de l'Europe ?", answers:["Ils s'opposent sur leurs systèmes politiques et économiques","Ils divergent sur le sort des criminels de guerre nazis","Ils ont des visions différentes sur la reconstruction du Japon","Ils refusent chacun de financer la reconstruction de l'Allemagne"], correct:0 },
  { q:"Quel concept décrit la politique américaine visant à empêcher le communisme de s'étendre à de nouveaux pays ?", answers:["La satellisation","La déstalinisation","L'endiguement","La coexistence pacifique"], correct:2 },
  { q:"Quel est l'objectif principal du Plan Marshall ?", answers:["Créer une alliance militaire contre l'URSS","Reconstruire économiquement l'Europe pour freiner l'influence soviétique","Punir les pays ayant collaboré avec les nazis","Financer la reconstruction du Japon sous occupation américaine"], correct:1 },
  { q:"Quelle est la principale conséquence du maccarthysme dans la société américaine ?", answers:["Une ouverture vers le dialogue avec l'URSS","Une remise en question de la politique d'endiguement","Une psychose anticommuniste et une panique morale généralisée","Un renforcement des libertés civiles pour contrer la propagande soviétique"], correct:2 },
  { q:"Par quelle stratégie l'URSS prend-elle progressivement le contrôle des pays d'Europe de l'Est ?", answers:["Elle impose l'adhésion au Pacte de Varsovie par la force directe","Elle installe les communistes aux postes clés : Intérieur, Justice, Armée…","Elle organise des référendums sous contrôle dans chaque pays","Elle finance des partis travaillistes pour remplacer les gouvernements"], correct:1 },
  { q:"Pourquoi Khrouchtchev est-il renversé par la nomenclatura après la mort de Staline ?", answers:["Il a conduit l'URSS à la défaite dans la course à l'espace","Il a perdu le soutien de l'armée après la crise de Cuba","La nomenclatura craint de perdre ses privilèges avec la déstalinisation","Il a voulu rapprocher l'URSS des États-Unis trop rapidement"], correct:2 },
  { q:"Pourquoi la Yougoslavie est-elle une « épine » pour le bloc communiste de Moscou ?", answers:["Elle menace d'adhérer à l'OTAN pour obtenir une protection militaire","Elle est communiste mais revendique son autonomie et refuse l'autorité soviétique","Elle soutient secrètement les révolutionnaires cubains contre Moscou","Elle accepte l'aide économique américaine tout en restant officiellement neutre"], correct:1 },
  { q:"Quelle est la principale cause de la crise des missiles de Cuba ?", answers:["L'URSS réagit à l'installation de missiles américains en Turquie","Cuba cherche à envahir la Floride avec le soutien soviétique","Castro nationalise les investissements américains sans compensation, poussant Cuba vers l'URSS","Kennedy ordonne un blocus naval sans provocation préalable"], correct:2 },
  { q:"Dans la course à l'espace, quelle puissance obtient les premières grandes réussites ?", answers:["Les États-Unis, grâce à leur supériorité technologique d'après-guerre","L'URSS, avec le premier satellite artificiel et le premier être vivant en orbite","Les deux puissances progressent exactement au même rythme","L'URSS, uniquement grâce à l'espionnage des laboratoires américains"], correct:1 },
  { q:"Qu'est-ce qui met fin aux « Trente Glorieuses » et provoque l'essoufflement économique du bloc occidental ?", answers:["La concurrence des industries japonaise et allemande sur les marchés mondiaux","L'échec du modèle keynésien face à la montée des inégalités sociales","Le choc pétrolier : inflation, crédit généralisé et abandon du dollar-étalon","La fin de la course aux armements qui réduit les investissements technologiques"], correct:2 }
];

const TIME = 20;
const sessionId = new URLSearchParams(location.search).get('session');
let myId = null, myName = '', myScore = 0;
let currentQ = -1, answered = false, timerInterval;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// JOIN
document.getElementById('btn-join').addEventListener('click', doJoin);
document.getElementById('name-input').addEventListener('keydown', e => { if (e.key==='Enter') doJoin(); });

function doJoin() {
  const name = document.getElementById('name-input').value.trim();
  const err  = document.getElementById('error-msg');
  if (!name)      { err.textContent = 'Entre ton prénom pour continuer.'; return; }
  if (!sessionId) { err.textContent = 'Lien de session invalide — scanne le QR code du prof.'; return; }
  err.textContent = '';
  myName = name;

  const ref = db.ref('sessions/' + sessionId + '/players').push();
  myId = ref.key;
  ref.set({ name });
  ref.onDisconnect().remove();

  document.getElementById('waiting-name').textContent = name;
  showScreen('waiting');
  listenSession();
}

function listenSession() {
  db.ref('sessions/' + sessionId).on('value', snap => {
    const d = snap.val();
    if (!d) return;

    if (d.state === 'lobby') {
      showScreen('waiting');
    }
    else if (d.state === 'question' && d.currentQuestion !== currentQ) {
      currentQ = d.currentQuestion;
      answered = false;
      loadQuestion(currentQ);
    }
    else if (d.state === 'reveal') {
      clearInterval(timerInterval);
      disableButtons();
      if (!answered) showResult(false, -1, 0);
    }
    else if (d.state === 'leaderboard') {
      myScore = (d.scores && d.scores[myId]) || 0;
      document.getElementById('score-badge').textContent = myScore + ' pts';
      buildLeaderboard(d.scores || {});
    }
    else if (d.state === 'podium') {
      myScore = (d.scores && d.scores[myId]) || 0;
      document.getElementById('score-badge').textContent = myScore + ' pts';
      buildPodium(d.scores || {});
    }
  });
}

function loadQuestion(idx) {
  clearInterval(timerInterval);
  const q = QUESTIONS[idx];
  document.getElementById('q-prog').textContent = 'Question ' + (idx+1) + '/10';
  document.getElementById('q-text-e').textContent = q.q;
  for (let i=0; i<4; i++) document.getElementById('e-ans-'+i).textContent = q.answers[i];

  document.querySelectorAll('.ans-btn').forEach(b => {
    b.classList.remove('selected','correct','wrong');
    b.disabled = false;
    b.onclick = () => submitAnswer(parseInt(b.dataset.idx));
  });

  document.getElementById('timer-fill-e').style.width = '100%';
  let t = TIME;
  timerInterval = setInterval(() => {
    t--;
    document.getElementById('timer-fill-e').style.width = (t/TIME*100) + '%';
    if (t <= 0) clearInterval(timerInterval);
  }, 1000);

  showScreen('question');
}

function submitAnswer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  disableButtons();
  document.querySelectorAll('.ans-btn')[idx].classList.add('selected');

  db.ref('sessions/' + sessionId + '/answers/' + myId).set(idx);

  const bar = document.getElementById('timer-fill-e');
  const pct = parseFloat(bar.style.width) / 100;
  const isCorrect = idx === QUESTIONS[currentQ].correct;
  const pts = isCorrect ? Math.round(pct * 500) + 500 : 0;
  showResult(isCorrect, idx, pts);
}

function disableButtons() {
  document.querySelectorAll('.ans-btn').forEach(b => { b.disabled = true; });
}

function showResult(isCorrect, idx, pts) {
  document.getElementById('result-icon').textContent   = isCorrect ? '✅' : '❌';
  const lbl = document.getElementById('result-label');
  lbl.textContent = isCorrect ? 'BONNE RÉPONSE !' : 'MAUVAISE RÉPONSE';
  lbl.className = isCorrect ? 'correct' : 'wrong';
  document.getElementById('result-pts').textContent   = isCorrect ? '+' + pts + ' points' : '+0 points';
  document.getElementById('result-total').textContent = 'Score total estimé : ' + (myScore + pts) + ' pts';
  showScreen('result');
}

function buildLeaderboard(scores) {
  db.ref('sessions/' + sessionId + '/players').once('value', snap => {
    const p = snap.val() || {};
    const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
    const list = document.getElementById('lb-e-list');
    list.innerHTML = '';
    sorted.slice(0,8).forEach(([pid, score], i) => {
      const row = document.createElement('div');
      row.className = 'lb-row' + (pid===myId?' me':'');
      row.innerHTML = '<span class="lb-rank">'+(i+1)+'</span>'
        +'<span class="lb-name">'+(p[pid]?.name||pid)+(pid===myId?' 👈':'')+'</span>'
        +'<span class="lb-score">'+score+' pts</span>';
      list.appendChild(row);
    });
    showScreen('lb');
  });
}

function buildPodium(scores) {
  db.ref('sessions/' + sessionId + '/players').once('value', snap => {
    const p = snap.val() || {};
    const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
    const myRank = sorted.findIndex(([pid]) => pid === myId) + 1;
    document.getElementById('my-rank').textContent = myRank;
    document.getElementById('total-p').textContent = sorted.length;
    document.getElementById('my-pts').textContent  = myScore + ' points';

    const list = document.getElementById('lb-final-e');
    list.innerHTML = '';
    sorted.slice(0,8).forEach(([pid, score], i) => {
      const row = document.createElement('div');
      row.className = 'lb-row' + (pid===myId?' me':'');
      row.innerHTML = '<span class="lb-rank">'+(i+1)+'</span>'
        +'<span class="lb-name">'+(p[pid]?.name||pid)+(pid===myId?' 👈':'')+'</span>'
        +'<span class="lb-score">'+score+' pts</span>';
      list.appendChild(row);
    });
    showScreen('podium');
  });
}

if (!sessionId) {
  document.getElementById('error-msg').textContent = 'Paramètre session manquant — utilise le lien ou le QR code du prof.';
}
</script>
</body>
</html>
