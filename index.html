<div class="quiz-card" style="
  background: linear-gradient(135deg, #0d4f4f 0%, #071a1a 100%);
  border: 2px solid #ff6847;
  border-radius: 14px;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: 0 4px 24px rgba(255,104,71,.15);
  transition: transform .2s, box-shadow .2s;
  cursor: pointer;
" onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 8px 32px rgba(255,104,71,.28)'"
   onmouseout="this.style.transform='';this.style.boxShadow='0 4px 24px rgba(255,104,71,.15)'">

  <div style="display:flex;align-items:center;justify-content:space-between;">
    <span style="
      font-family:'Bebas Neue',sans-serif;
      font-size:.75rem;
      letter-spacing:3px;
      color:#ff8c6e;
      text-transform:uppercase;
    ">Histoire · Bloc B</span>
    <span style="
      background:#ff6847;
      color:#071a1a;
      font-family:'Bebas Neue',sans-serif;
      font-size:.75rem;
      letter-spacing:2px;
      padding:3px 10px;
      border-radius:20px;
    ">10 questions</span>
  </div>

  <div style="
    font-family:'Bebas Neue',sans-serif;
    font-size:1.7rem;
    letter-spacing:3px;
    color:#f5f0e8;
    line-height:1.1;
  ">La Guerre froide</div>

  <div style="
    font-size:.82rem;
    color:#8aa8a8;
    line-height:1.5;
  ">Causes, blocs, crises et rivalités. Doctrine Truman, Plan Marshall, OTAN, maccarthysme, course à l'espace.</div>

  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;">
    <a href="guerre-froide/prof.html" style="
      flex:1;
      background:#1a6b6b;
      color:#f5f0e8;
      text-decoration:none;
      font-family:'IBM Plex Sans',sans-serif;
      font-size:.82rem;
      font-weight:700;
      padding:10px;
      border-radius:8px;
      text-align:center;
      border:1.5px solid #ff6847;
      transition:background .2s;
    " onmouseover="this.style.background='#ff6847';this.style.color='#071a1a'"
       onmouseout="this.style.background='#1a6b6b';this.style.color='#f5f0e8'">
      📽️ Vue prof
    </a>
    <a href="guerre-froide/eleve.html" style="
      flex:1;
      background:#071a1a;
      color:#f5f0e8;
      text-decoration:none;
      font-family:'IBM Plex Sans',sans-serif;
      font-size:.82rem;
      font-weight:700;
      padding:10px;
      border-radius:8px;
      text-align:center;
      border:1.5px solid #1a6b6b;
      transition:background .2s;
    " onmouseover="this.style.background='#1a6b6b'"
       onmouseout="this.style.background='#071a1a'">
      📱 Vue élève
    </a>
  </div>
</div>
