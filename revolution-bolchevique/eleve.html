<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Quiz Révolution bolchévique</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700;900&display=swap');
  :root{--red:#c0392b;--gold:#f39c12;--dark:#0d0d0d;--mid:#1a1a1a;--card:#222;--border:#333;--text:#f0ece4;--muted:#888;--green:#27ae60;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:'Barlow',sans-serif;background:var(--dark);color:var(--text);display:flex;flex-direction:column;}

  /* ── TOPBAR ── */
  .topbar{background:var(--mid);border-bottom:3px solid var(--red);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--muted);}
  .score-badge{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold);background:var(--card);border:1px solid var(--border);padding:4px 14px;border-radius:4px;}

  /* ── SCREENS ── */
  .screen{display:none;flex:1;flex-direction:column;overflow:hidden;}
  .screen.active{display:flex;}

  /* ══ JOIN ══ */
  #screen-join{align-items:center;justify-content:center;gap:20px;padding:28px 20px;}
  .join-logo{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:4px;text-align:center;line-height:1.1;}
  .join-logo span{color:var(--red);}
  .join-sub{color:var(--muted);font-size:0.9rem;text-align:center;}
  .join-form{width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px;}
  .join-form input{background:var(--card);border:2px solid var(--border);color:var(--text);font-family:'Barlow',sans-serif;font-size:1.1rem;padding:14px 16px;border-radius:6px;outline:none;width:100%;transition:.2s;}
  .join-form input:focus{border-color:var(--red);}
  .join-form input::placeholder{color:var(--muted);}
  .join-btn{background:var(--red);border:none;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;padding:14px;border-radius:6px;cursor:pointer;transition:.15s;}
  .join-btn:active{transform:scale(.97);}
  .join-error{color:var(--red);font-size:0.85rem;text-align:center;display:none;}

  /* ══ WAITING ══ */
  #screen-waiting{align-items:center;justify-content:center;gap:16px;padding:30px;text-align:center;}
  .wait-icon{font-size:3.5rem;animation:pulse 1.5s ease infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  .wait-name{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--gold);}
  .wait-sub{color:var(--muted);font-size:0.9rem;}

  /* ══ QUESTION ══ */
  #screen-question{padding:14px;gap:10px;}
  .q-top{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .q-num-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
  .q-timer-lbl{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--gold);transition:color .3s;}
  .q-timer-lbl.warn{color:#e67e22;}.q-timer-lbl.danger{color:var(--red);}
  .timer-bar-wrap{height:5px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0;}
  .timer-bar-fill{height:100%;width:100%;background:var(--gold);transition:width 1s linear,background .5s;}
  .q-text-bubble{background:var(--card);border-left:4px solid var(--red);border-radius:0 8px 8px 0;padding:14px 16px;font-family:'Barlow Condensed',sans-serif;font-size:1.15rem;font-weight:700;line-height:1.3;flex-shrink:0;}
  .btns-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1;}
  .choice-btn{display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;gap:4px;border:none;border-radius:10px;padding:12px 14px;cursor:pointer;color:#fff;text-align:left;transition:.15s;position:relative;}
  .choice-btn:active{transform:scale(.96);}
  .choice-btn .lbl{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;line-height:1;opacity:.85;}
  .choice-btn .txt{font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:700;line-height:1.2;}
  .choice-btn.A{background:linear-gradient(145deg,#a93226,#c0392b);}
  .choice-btn.B{background:linear-gradient(145deg,#1a5f8a,#2980b9);}
  .choice-btn.C{background:linear-gradient(145deg,#1a7a40,#27ae60);}
  .choice-btn.D{background:linear-gradient(145deg,#9a6500,#f39c12);}
  .choice-btn.disabled{pointer-events:none;}
  .choice-btn.selected{outline:3px solid rgba(255,255,255,0.8);outline-offset:2px;}
  .choice-btn.correct-reveal{outline:3px solid #2ecc71;box-shadow:0 0 20px rgba(46,204,113,0.5);opacity:1!important;}
  .choice-btn.wrong-reveal{opacity:0.25;}

  /* ══ RESULT ══ */
  #screen-result{align-items:center;justify-content:center;gap:16px;padding:30px;text-align:center;}
  .r-icon{font-size:4rem;animation:popIn .4s ease;}
  @keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
  .r-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:2px;}
  .r-pts{font-family:'Bebas Neue',sans-serif;font-size:3rem;}
  .r-sub{color:var(--muted);font-size:0.85rem;}

  /* ══ PODIUM ══ */
  #screen-podium{align-items:center;justify-content:center;gap:16px;padding:30px;text-align:center;}
  #screen-podium h2{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;color:var(--gold);}
  .my-result{background:var(--card);border:2px solid var(--gold);border-radius:10px;padding:24px 36px;width:100%;max-width:300px;}
  .my-rank{font-family:'Bebas Neue',sans-serif;font-size:4rem;line-height:1;}
  .my-pts{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--gold);}
  .my-name-txt{font-size:0.9rem;color:var(--muted);margin-top:4px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">☭ RÉVOLUTION BOLCHÉVIQUE</div>
  <div class="score-badge" id="score-badge">0 pts</div>
</div>

<!-- ════ JOIN ════ -->
<div id="screen-join" class="screen active">
  <div class="join-logo">QUIZ<br><span>HISTOIRE</span></div>
  <div class="join-sub">Révolution bolchévique · G. Simard</div>
  <div class="join-form">
    <input id="name-input" type="text" placeholder="Ton prénom…" maxlength="20" autocomplete="off" autocorrect="off" autocapitalize="words"/>
    <div class="join-error" id="join-error">Entre ton prénom pour continuer.</div>
    <button class="join-btn" onclick="joinQuiz()">REJOINDRE ▶</button>
  </div>
</div>

<!-- ════ WAITING ════ -->
<div id="screen-waiting" class="screen">
  <div class="wait-icon">⏳</div>
  <div class="wait-name" id="wait-name">…</div>
  <div class="wait-sub">En attente du professeur…</div>
</div>

<!-- ════ QUESTION ════ -->
<div id="screen-question" class="screen">
  <div class="q-top">
    <div class="q-num-lbl" id="q-num-lbl">Q 1 / 10</div>
    <div class="q-timer-lbl" id="q-timer-lbl">20</div>
  </div>
  <div class="timer-bar-wrap"><div class="timer-bar-fill" id="timer-bar"></div></div>
  <div class="q-text-bubble" id="q-text-bubble">…</div>
  <div class="btns-grid">
    <button class="choice-btn A" id="btn-0" onclick="submitAnswer(0)"><span class="lbl">A</span><span class="txt" id="opt-0"></span></button>
    <button class="choice-btn B" id="btn-1" onclick="submitAnswer(1)"><span class="lbl">B</span><span class="txt" id="opt-1"></span></button>
    <button class="choice-btn C" id="btn-2" onclick="submitAnswer(2)"><span class="lbl">C</span><span class="txt" id="opt-2"></span></button>
    <button class="choice-btn D" id="btn-3" onclick="submitAnswer(3)"><span class="lbl">D</span><span class="txt" id="opt-3"></span></button>
  </div>
</div>

<!-- ════ RESULT ════ -->
<div id="screen-result" class="screen">
  <div class="r-icon" id="r-icon">🎯</div>
  <div class="r-title" id="r-title">BONNE RÉPONSE !</div>
  <div class="r-pts" id="r-pts" style="color:var(--gold)">+1000 pts</div>
  <div class="r-sub">Attends la prochaine question…</div>
</div>

<!-- ════ PODIUM ════ -->
<div id="screen-podium" class="screen">
  <h2>🏆 RÉSULTAT FINAL</h2>
  <div class="my-result">
    <div class="my-rank" id="my-rank">—</div>
    <div class="my-pts" id="my-pts">0 pts</div>
    <div class="my-name-txt" id="my-name-txt"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  FIREBASE — mêmes chemins que totalitarisme
// ══════════════════════════════════════════════
firebase.initializeApp({ databaseURL:"https://quiz-totalitarisme-default-rtdb.firebaseio.com/" });
const db = firebase.database();

// ══════════════════════════════════════════════
//  ÉTAT  (sessionStorage pour survivre aux rechargements)
// ══════════════════════════════════════════════
let myUID   = sessionStorage.getItem('bolch_uid')  || null;
let myName  = sessionStorage.getItem('bolch_name') || '';
let myScore = 0;
let currentQ = -1;
let answered = false;
let myAnswer = -1;
let timerInterval = null;
let currentOptions = [];
let currentCorrect = -1;

// Si déjà connecté (rechargement de page) → passer directement à l'attente
if (myUID && myName) {
  document.getElementById('wait-name').textContent = myName;
  showScreen('screen-waiting');
  // Re-enregistrer au cas où Firebase aurait supprimé l'entrée
  db.ref(`players/${myUID}`).set({ name: myName, score: 0 });
  db.ref(`players/${myUID}`).onDisconnect().remove();
  listenScore();
  listenGame();
}

// ══════════════════════════════════════════════
//  REJOINDRE
// ══════════════════════════════════════════════
function joinQuiz() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) {
    document.getElementById('join-error').style.display = 'block';
    document.getElementById('name-input').focus();
    return;
  }
  document.getElementById('join-error').style.display = 'none';
  myName = name;
  myUID  = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
  sessionStorage.setItem('bolch_uid',  myUID);
  sessionStorage.setItem('bolch_name', myName);

  db.ref(`players/${myUID}`).set({ name: myName, score: 0 });
  db.ref(`players/${myUID}`).onDisconnect().remove();

  document.getElementById('wait-name').textContent = myName;
  showScreen('screen-waiting');
  listenScore();
  listenGame();
}

// ══════════════════════════════════════════════
//  ÉCOUTER LE SCORE
// ══════════════════════════════════════════════
function listenScore() {
  db.ref(`players/${myUID}/score`).on('value', snap => {
    myScore = snap.val() || 0;
    document.getElementById('score-badge').textContent = myScore + ' pts';
  });
}

// ══════════════════════════════════════════════
//  ÉCOUTER L'ÉTAT DU JEU
// ══════════════════════════════════════════════
function listenGame() {
  db.ref('gameState').on('value', snap => {
    const state = snap.val();
    if (!state) return;

    // Nouvelle question
    if (state.phase === 'question' && state.questionIndex !== currentQ) {
      currentQ = state.questionIndex;
      answered = false;
      myAnswer = -1;
      currentOptions = state.options || [];
      currentCorrect = -1;
      displayQuestion(state.questionIndex, state.question, state.options, state.timeLeft);
    }

    // Mise à jour du timer
    if (state.phase === 'question' && state.questionIndex === currentQ) {
      updateTimerDisplay(state.timeLeft);
    }

    // Timer fermé (plus de nouvelles réponses) — on attend la révélation
    if (state.phase === 'closed') {
      stopLocalTimer();
    }

    // Révélation de la bonne réponse
    if (state.phase === 'revealed' && state.questionIndex === currentQ) {
      currentCorrect = state.correctAnswer;
      showReveal(state.correctAnswer);
    }

    // Podium
    if (state.phase === 'podium') {
      showFinalPodium();
    }

    // Reset
    if (state.phase === 'lobby' && currentQ >= 0) {
      // Le prof a réinitialisé — vider la session et recharger
      sessionStorage.removeItem('bolch_uid');
      sessionStorage.removeItem('bolch_name');
      location.reload();
    }
  });
}

// ══════════════════════════════════════════════
//  AFFICHER UNE QUESTION
// ══════════════════════════════════════════════
function displayQuestion(idx, question, options, timeLeftInit) {
  document.getElementById('q-num-lbl').textContent = `Q ${idx + 1} / 10`;
  document.getElementById('q-text-bubble').textContent = question;
  options.forEach((opt, i) => {
    document.getElementById(`opt-${i}`).textContent = opt;
    const btn = document.getElementById(`btn-${i}`);
    btn.classList.remove('disabled','selected','correct-reveal','wrong-reveal');
    btn.style.opacity = '';
  });
  showScreen('screen-question');
  startLocalTimer(timeLeftInit || 20);
}

// ══════════════════════════════════════════════
//  TIMER LOCAL (synchronisé avec gameState.timeLeft)
// ══════════════════════════════════════════════
function startLocalTimer(seconds) {
  stopLocalTimer();
  let t = seconds;
  updateTimerDisplay(t);
  timerInterval = setInterval(() => {
    t--;
    updateTimerDisplay(t);
    if (t <= 0) stopLocalTimer();
  }, 1000);
}

function stopLocalTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerDisplay(t) {
  const num = document.getElementById('q-timer-lbl');
  const bar = document.getElementById('timer-bar');
  if (!num) return;
  num.textContent = Math.max(0, t);
  num.className = 'q-timer-lbl' + (t <= 5 ? ' danger' : t <= 10 ? ' warn' : '');
  const pct = Math.max(0, (t / 20) * 100);
  bar.style.width = pct + '%';
  bar.style.background = t <= 5 ? 'var(--red)' : t <= 10 ? '#e67e22' : 'var(--gold)';
}

// ══════════════════════════════════════════════
//  SOUMETTRE UNE RÉPONSE
// ══════════════════════════════════════════════
function submitAnswer(idx) {
  if (answered) return;
  answered = true;
  myAnswer = idx;

  // Enregistrer dans Firebase — même structure que totalitarisme
  db.ref(`answers/${myUID}`).set({
    uid:      myUID,
    question: currentQ,
    answer:   idx,
    time:     Date.now()
  });

  // Feedback visuel
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById(`btn-${i}`);
    btn.classList.add('disabled');
    if (i === idx) btn.classList.add('selected');
    else btn.style.opacity = '0.35';
  }
}

// ══════════════════════════════════════════════
//  RÉVÉLATION
// ══════════════════════════════════════════════
function showReveal(correct) {
  stopLocalTimer();
  // Montrer visuellement la bonne/mauvaise réponse
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById(`btn-${i}`);
    btn.classList.add('disabled');
    btn.style.opacity = '';
    btn.classList.remove('selected');
    if (i === correct) btn.classList.add('correct-reveal');
    else btn.classList.add('wrong-reveal');
  }
  // Passer à l'écran résultat après un court délai
  setTimeout(() => {
    const isCorrect = (myAnswer === correct);
    document.getElementById('r-icon').textContent  = isCorrect ? '🎯' : '❌';
    document.getElementById('r-title').textContent = isCorrect ? 'BONNE RÉPONSE !' : 'MAUVAISE RÉPONSE';
    document.getElementById('r-pts').textContent   = isCorrect ? '+1000 pts' : '+0 pt';
    document.getElementById('r-pts').style.color   = isCorrect ? 'var(--gold)' : 'var(--muted)';
    showScreen('screen-result');
  }, 1200);
}

// ══════════════════════════════════════════════
//  PODIUM FINAL
// ══════════════════════════════════════════════
function showFinalPodium() {
  db.ref('players').once('value').then(snap => {
    const all = snap.val() || {};
    const sorted = Object.entries(all)
      .map(([uid, p]) => ({ uid, name: p.name || '?', score: p.score || 0 }))
      .sort((a, b) => b.score - a.score);
    const rank  = sorted.findIndex(p => p.uid === myUID) + 1;
    const medals = { 1:'🥇', 2:'🥈', 3:'🥉' };
    document.getElementById('my-rank').textContent    = medals[rank] || '#' + rank;
    document.getElementById('my-pts').textContent     = myScore + ' pts';
    document.getElementById('my-name-txt').textContent = myName;
    showScreen('screen-podium');
  });
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('name-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') joinQuiz();
});
</script>
</body>
</html>
