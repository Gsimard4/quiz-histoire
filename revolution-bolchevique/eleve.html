<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Quiz – Révolution bolchévique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
  :root {
    --red: #c0392b; --red2: #8b0000; --gold: #d4af37;
    --dark: #0d0404; --panel: #1f0b0b; --text: #f0e6e6; --muted: #9e7070;
    --A: #e74c3c; --B: #3498db; --C: #2ecc71; --D: #f39c12;
    --green: #27ae60;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--dark); color:var(--text);
    font-family:'Barlow',sans-serif;
    min-height:100vh; overflow-x:hidden;
    display:flex; flex-direction:column;
  }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background: radial-gradient(ellipse at top, rgba(139,0,0,.3),transparent 60%);
  }

  .page { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; }

  /* ─── NAV BAR ─── */
  .topbar {
    background: linear-gradient(135deg,var(--red2),var(--red));
    padding:12px 18px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:2px solid var(--gold);
  }
  .topbar-title { font-family:'Oswald',sans-serif; font-size:1rem; letter-spacing:1px; }
  .score-badge {
    background:rgba(0,0,0,.4); border:1px solid var(--gold);
    padding:4px 12px; border-radius:20px;
    font-family:'Oswald',sans-serif; font-size:1rem; color:var(--gold);
  }

  /* ─── JOIN SCREEN ─── */
  #screen-join {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:30px 24px; gap:24px;
  }
  .join-logo {
    font-family:'Oswald',sans-serif; font-size:3rem; font-weight:700;
    text-align:center; line-height:1;
    background:linear-gradient(135deg,var(--red),var(--gold));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .join-sub { color:var(--muted); text-align:center; font-size:.95rem; }
  .join-form { width:100%; max-width:340px; display:flex; flex-direction:column; gap:12px; }
  .join-form input {
    background:var(--panel); border:2px solid rgba(192,57,43,.5);
    color:var(--text); font-family:'Barlow',sans-serif; font-size:1.1rem;
    padding:14px 18px; border-radius:10px; outline:none; width:100%;
    transition:.2s;
  }
  .join-form input:focus { border-color:var(--gold); }
  .join-form input::placeholder { color:var(--muted); }
  .join-btn {
    background:linear-gradient(135deg,var(--red),var(--red2));
    border:2px solid var(--gold); color:#fff;
    font-family:'Oswald',sans-serif; font-size:1.3rem; letter-spacing:2px;
    padding:16px; border-radius:10px; cursor:pointer; transition:.2s;
    text-transform:uppercase;
  }
  .join-btn:active { transform:scale(.97); }

  /* ─── WAITING ─── */
  #screen-waiting {
    flex:1; display:none; flex-direction:column;
    align-items:center; justify-content:center;
    padding:30px; gap:20px; text-align:center;
  }
  .waiting-icon { font-size:4rem; animation:pulse 1.5s ease infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  .waiting-name {
    font-family:'Oswald',sans-serif; font-size:1.8rem; color:var(--gold);
  }
  .waiting-txt { color:var(--muted); font-size:.95rem; }

  /* ─── QUESTION SCREEN ─── */
  #screen-question {
    flex:1; display:none; flex-direction:column; padding:16px; gap:14px;
  }

  /* timer bar */
  .timer-bar-wrap { height:8px; background:rgba(255,255,255,.1); border-radius:4px; overflow:hidden; }
  .timer-bar-fill {
    height:100%; background:var(--gold); border-radius:4px;
    transition:width .9s linear, background .5s;
    width:100%;
  }

  .q-num-lbl { font-family:'Oswald',sans-serif; font-size:.85rem; color:var(--muted); letter-spacing:2px; }

  .q-bubble {
    background:var(--panel); border-left:4px solid var(--red);
    border-radius:10px; padding:18px 16px;
    font-family:'Oswald',sans-serif; font-size:1.2rem; font-weight:600;
    line-height:1.4; flex-shrink:0;
  }

  .btns-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:10px; flex:1;
  }
  .choice-btn {
    display:flex; flex-direction:column; align-items:flex-start;
    justify-content:flex-start; gap:6px;
    border:none; border-radius:12px; padding:14px 16px;
    cursor:pointer; font-family:'Barlow',sans-serif; font-size:.95rem;
    color:#fff; text-align:left; transition:.15s; position:relative;
    overflow:hidden; min-height:80px;
  }
  .choice-btn:active { transform:scale(.96); }
  .choice-btn .lbl {
    font-family:'Oswald',sans-serif; font-size:1.4rem; font-weight:700;
    opacity:.9;
  }
  .choice-btn.A { background:linear-gradient(135deg,#a93226,#c0392b); }
  .choice-btn.B { background:linear-gradient(135deg,#1a6fa6,#2980b9); }
  .choice-btn.C { background:linear-gradient(135deg,#1d8348,#27ae60); }
  .choice-btn.D { background:linear-gradient(135deg,#b7770d,#f39c12); }

  .choice-btn.answered { opacity:.5; pointer-events:none; }
  .choice-btn.correct  { opacity:1; border:3px solid #fff; box-shadow:0 0 20px rgba(255,255,255,.4); }
  .choice-btn.wrong    { opacity:.3; pointer-events:none; }
  .choice-btn.selected::after {
    content:'✓'; position:absolute; right:10px; top:10px;
    font-size:1.3rem; color:rgba(255,255,255,.6);
  }

  /* ─── RESULT SCREEN ─── */
  #screen-result {
    flex:1; display:none; flex-direction:column;
    align-items:center; justify-content:center;
    padding:30px; gap:16px; text-align:center;
  }
  .result-icon { font-size:4rem; animation:zoomIn .4s ease; }
  @keyframes zoomIn { from{transform:scale(0)} to{transform:scale(1)} }
  .result-title {
    font-family:'Oswald',sans-serif; font-size:2rem; letter-spacing:2px;
  }
  .result-pts {
    font-family:'Oswald',sans-serif; font-size:3rem; color:var(--gold);
  }
  .result-txt { color:var(--muted); font-size:.9rem; }

  /* ─── PODIUM SCREEN ─── */
  #screen-podium {
    flex:1; display:none; flex-direction:column;
    align-items:center; justify-content:center;
    padding:30px; gap:16px; text-align:center;
  }
  #screen-podium h2 {
    font-family:'Oswald',sans-serif; font-size:2rem; color:var(--gold); letter-spacing:3px;
  }
  .my-final {
    background:var(--panel); border:2px solid var(--gold);
    border-radius:12px; padding:20px 30px; width:100%; max-width:320px;
  }
  .my-final .rank { font-family:'Oswald',sans-serif; font-size:3rem; }
  .my-final .pts  { color:var(--gold); font-family:'Oswald',sans-serif; font-size:1.8rem; }

  .screen { display:none; flex-direction:column; }
  .screen.active { display:flex !important; }
</style>
</head>
<body>
<div class="page">

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-title">☭ Révolution Bolchévique</div>
  <div class="score-badge" id="score-disp">0 pts</div>
</div>

<!-- ════ JOIN ════ -->
<div id="screen-join" class="screen active">
  <div class="join-logo">QUIZ<br>HISTOIRE</div>
  <div class="join-sub">Révolution bolchévique</div>
  <div class="join-form">
    <input type="text" id="name-input" placeholder="Ton prénom…" maxlength="20" autocomplete="off"/>
    <button class="join-btn" onclick="joinQuiz()">REJOINDRE ⚡</button>
  </div>
</div>

<!-- ════ WAITING ════ -->
<div id="screen-waiting" class="screen">
  <div class="waiting-icon">⏳</div>
  <div class="waiting-name" id="waiting-name"></div>
  <div class="waiting-txt">En attente du professeur…</div>
</div>

<!-- ════ QUESTION ════ -->
<div id="screen-question" class="screen">
  <div class="timer-bar-wrap"><div class="timer-bar-fill" id="timer-bar"></div></div>
  <div class="q-num-lbl" id="q-num-lbl">QUESTION 1/10</div>
  <div class="q-bubble" id="q-bubble">…</div>
  <div class="btns-grid" id="btns-grid">
    <button class="choice-btn A" onclick="submitAnswer(0)"><span class="lbl">A</span><span id="txt-0"></span></button>
    <button class="choice-btn B" onclick="submitAnswer(1)"><span class="lbl">B</span><span id="txt-1"></span></button>
    <button class="choice-btn C" onclick="submitAnswer(2)"><span class="lbl">C</span><span id="txt-2"></span></button>
    <button class="choice-btn D" onclick="submitAnswer(3)"><span class="lbl">D</span><span id="txt-3"></span></button>
  </div>
</div>

<!-- ════ RESULT ════ -->
<div id="screen-result" class="screen">
  <div class="result-icon" id="r-icon">🎯</div>
  <div class="result-title" id="r-title">BONNE RÉPONSE !</div>
  <div class="result-pts" id="r-pts">+100</div>
  <div class="result-txt">Prochaine question dans un instant…</div>
</div>

<!-- ════ PODIUM ════ -->
<div id="screen-podium" class="screen">
  <h2>🏆 RÉSULTAT FINAL</h2>
  <div class="my-final">
    <div class="rank" id="final-rank">—</div>
    <div class="pts" id="final-pts">0 pts</div>
  </div>
</div>

</div><!-- .page -->

<script>
const firebaseConfig = { databaseURL: "https://quiz-totalitarisme-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const QUIZ_PATH = "revolution_bolchevique";
const TIMER_DURATION = 20;

let myUID = null;
let myName = '';
let myScore = 0;
let currentQIdx = -1;
let questions = [];
let answered = false;
let myAnswer = -1;
let timerInterval = null;

// ─── JOIN ───
function joinQuiz() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { document.getElementById('name-input').focus(); return; }
  myName = name;
  myUID = 'student_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);

  db.ref(`${QUIZ_PATH}/students/${myUID}`).set({ name, score:0 });
  db.ref(`${QUIZ_PATH}/students/${myUID}`).onDisconnect().remove();

  document.getElementById('waiting-name').textContent = `Bienvenue, ${name} !`;
  showScreen('screen-waiting');
  listenToGame();
}

// ─── GAME LISTENER ───
function listenToGame() {
  db.ref(`${QUIZ_PATH}/gameState`).on('value', snap => {
    const state = snap.val();
    if (!state) return;

    if (state.phase === 'question' && state.questionIndex !== currentQIdx) {
      currentQIdx = state.questionIndex;
      answered = false; myAnswer = -1;
      loadQuestion(currentQIdx, state.timerStart);
    }
    if (state.phase === 'reveal') {
      revealResult();
    }
    if (state.phase === 'podium') {
      showFinalPodium();
    }
    if (state.phase === 'reset') {
      location.reload();
    }
  });

  db.ref(`${QUIZ_PATH}/students/${myUID}/score`).on('value', snap => {
    myScore = snap.val() || 0;
    document.getElementById('score-disp').textContent = myScore + ' pts';
  });
}

// ─── LOAD QUESTION ───
function loadQuestion(idx, timerStart) {
  db.ref(`${QUIZ_PATH}/questions/${idx}`).once('value').then(snap => {
    const q = snap.val();
    if (!q) return;
    questions[idx] = q;

    document.getElementById('q-num-lbl').textContent = `QUESTION ${idx+1}/10`;
    document.getElementById('q-bubble').textContent = q.q;
    for (let i=0;i<4;i++) {
      document.getElementById(`txt-${i}`).textContent = q.answers[i];
      const btn = document.querySelectorAll('.choice-btn')[i];
      btn.classList.remove('answered','correct','wrong','selected');
      btn.style.opacity='';
    }
    showScreen('screen-question');
    startTimerBar(timerStart);
  });
}

function startTimerBar(serverStart) {
  if (timerInterval) clearInterval(timerInterval);
  const bar = document.getElementById('timer-bar');
  bar.style.transition='none'; bar.style.width='100%';

  timerInterval = setInterval(() => {
    const elapsed = (Date.now() - serverStart) / 1000;
    const pct = Math.max(0, 100 - (elapsed/TIMER_DURATION)*100);
    bar.style.transition = 'width .9s linear';
    bar.style.width = pct + '%';
    if (pct <= 25) bar.style.background='#e74c3c';
    else if (pct <= 50) bar.style.background='#e67e22';
    else bar.style.background='var(--gold)';
    if (pct <= 0) { clearInterval(timerInterval); timerInterval=null; }
  }, 500);
}

// ─── SUBMIT ANSWER ───
function submitAnswer(idx) {
  if (answered) return;
  answered = true; myAnswer = idx;

  db.ref(`${QUIZ_PATH}/answers/${currentQIdx}/${myUID}`).set(idx);
  document.querySelectorAll('.choice-btn').forEach((b,i) => {
    if (i === idx) b.classList.add('selected');
    b.classList.add('answered');
  });
}

// ─── REVEAL ───
function revealResult() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval=null; }
  const q = questions[currentQIdx];
  if (!q) { showScreen('screen-result'); return; }

  document.querySelectorAll('.choice-btn').forEach((b,i) => {
    b.classList.remove('answered','selected');
    if (i === q.correct) b.classList.add('correct');
    else b.classList.add('wrong');
  });

  const correct = (myAnswer === q.correct);
  const pts = correct ? 100 : 0;

  setTimeout(() => {
    document.getElementById('r-icon').textContent = correct ? '🎯' : '❌';
    document.getElementById('r-title').textContent = correct ? 'BONNE RÉPONSE !' : 'MAUVAISE RÉPONSE';
    document.getElementById('r-pts').textContent = correct ? '+100 pts' : '+0 pts';
    document.getElementById('r-pts').style.color = correct ? 'var(--gold)' : 'var(--muted)';
    showScreen('screen-result');
  }, 1000);
}

// ─── PODIUM ───
function showFinalPodium() {
  db.ref(`${QUIZ_PATH}/students`).once('value').then(snap => {
    const all = snap.val() || {};
    const sorted = Object.entries(all)
      .map(([uid,s])=>({uid, name:s.name||'?', score:s.score||0}))
      .sort((a,b)=>b.score-a.score);

    const rank = sorted.findIndex(s=>s.uid===myUID)+1;
    const medals = ['🥇','🥈','🥉'];

    document.getElementById('final-rank').textContent =
      rank <= 3 ? medals[rank-1] : `#${rank}`;
    document.getElementById('final-pts').textContent = `${myScore} pts`;
    showScreen('screen-podium');
  });
}

// ─── UTILS ───
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Enter key to join
document.getElementById('name-input').addEventListener('keypress', e => {
  if (e.key==='Enter') joinQuiz();
});
</script>
</body>
</html>
