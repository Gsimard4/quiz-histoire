<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Révolution bolchévique — Professeur</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --red:#c0392b; --red2:#7b241c; --gold:#f39c12;
  --dark:#0d0d0d; --mid:#161616; --panel:#1e1e1e;
  --border:#2e2e2e; --text:#f0ece4; --muted:#777;
  --green:#27ae60; --A:#e74c3c; --B:#2980b9; --C:#27ae60; --D:#f39c12;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* ── TOP BAR ── */
.topbar{
  background:var(--mid); border-bottom:3px solid var(--red);
  padding:12px 24px; display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;}
.topbar-title span{color:var(--red);}
.topbar-right{display:flex;gap:12px;align-items:center;}
.pill{
  background:var(--panel); border:1px solid var(--border);
  padding:6px 14px; border-radius:20px;
  font-family:'Barlow Condensed',sans-serif; font-size:0.9rem; letter-spacing:1px;
}
.pill b{color:var(--gold);}
#phase-pill{border-color:var(--red);color:var(--red);}

/* ── SCREENS ── */
.screen{display:none;flex:1;}
.screen.active{display:flex;}

/* ══════════ LOBBY ══════════ */
#screen-lobby{
  flex-direction:column; align-items:center; justify-content:center;
  gap:28px; padding:40px 24px;
}
.lobby-title{
  font-family:'Bebas Neue',sans-serif; font-size:2.8rem; letter-spacing:4px;
  text-align:center; color:var(--text);
}
.lobby-title span{color:var(--red);}
.lobby-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;width:100%;max-width:860px;}

.box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:24px;}
.box h3{
  font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);margin-bottom:16px;
}
#qr-img{background:#fff;padding:8px;border-radius:6px;width:190px;height:190px;display:block;margin:0 auto 10px;}
.qr-url{font-size:0.65rem;color:var(--muted);text-align:center;word-break:break-all;}

#student-list{display:flex;flex-wrap:wrap;gap:8px;max-height:200px;overflow-y:auto;}
.chip{
  background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.35);
  padding:5px 12px;border-radius:20px;font-size:0.82rem;
  animation:pop .25s ease;
}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

.start-btn{
  background:var(--red);border:none;color:#fff;
  font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;
  padding:16px 60px;border-radius:6px;cursor:pointer;transition:.2s;
  box-shadow:0 6px 24px rgba(192,57,43,0.4);
}
.start-btn:hover{background:var(--red2);transform:translateY(-2px);}
.start-btn:active{transform:translateY(0);}

/* ══════════ QUESTION ══════════ */
#screen-question{flex-direction:column;padding:20px;gap:16px;}

.q-top{display:flex;align-items:center;justify-content:space-between;gap:16px;}
.q-label{
  font-family:'Barlow Condensed',sans-serif;font-size:1rem;
  letter-spacing:2px;text-transform:uppercase;color:var(--muted);
}
.timer-block{display:flex;align-items:center;gap:10px;}
.timer-num{
  font-family:'Bebas Neue',sans-serif;font-size:3rem;
  line-height:1;min-width:48px;text-align:center;transition:color .3s;
}
.timer-num.warn{color:var(--gold);}
.timer-num.danger{color:var(--red);}
.stop-btn{
  background:transparent;border:2px solid var(--red);color:var(--red);
  font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;letter-spacing:1px;
  padding:8px 18px;border-radius:4px;cursor:pointer;transition:.2s;
}
.stop-btn:hover{background:var(--red);color:#fff;}

/* Timer bar */
.timer-bar-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.timer-bar-fill{
  height:100%;width:100%;border-radius:3px;
  background:var(--gold);transition:width 1s linear,background .5s;
}

.q-text{
  background:var(--panel);border-left:4px solid var(--red);
  border-radius:8px;padding:20px 24px;
  font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:1px;
  line-height:1.3;
}

/* Answers grid */
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ans-card{
  background:var(--panel);border:2px solid var(--border);
  border-radius:8px;padding:14px 18px;
  display:flex;align-items:center;gap:14px;
  position:relative;overflow:hidden;transition:.3s;
}
.ans-card.A{border-color:var(--A);}
.ans-card.B{border-color:var(--B);}
.ans-card.C{border-color:var(--C);}
.ans-card.D{border-color:var(--D);}
.ans-lbl{
  font-family:'Bebas Neue',sans-serif;font-size:1.5rem;
  flex-shrink:0;width:28px;
}
.ans-card.A .ans-lbl{color:var(--A);}
.ans-card.B .ans-lbl{color:var(--B);}
.ans-card.C .ans-lbl{color:var(--C);}
.ans-card.D .ans-lbl{color:var(--D);}
.ans-txt{flex:1;font-size:0.95rem;}
.ans-count{
  font-family:'Bebas Neue',sans-serif;font-size:1.3rem;
  opacity:0;transition:.3s;margin-left:auto;flex-shrink:0;
}

/* Fill bar behind answer */
.ans-fill{
  position:absolute;left:0;top:0;bottom:0;width:0%;
  opacity:0.12;transition:width .6s ease;
}
.ans-card.A .ans-fill{background:var(--A);}
.ans-card.B .ans-fill{background:var(--B);}
.ans-card.C .ans-fill{background:var(--C);}
.ans-card.D .ans-fill{background:var(--D);}

/* Correct highlight after reveal */
.ans-card.correct{
  border-color:var(--green) !important;
  background:rgba(39,174,96,0.12);
}
.ans-card.correct .ans-lbl{color:var(--green) !important;}
.ans-card.wrong{opacity:0.4;}

/* Bottom bar */
.q-bottom{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:4px;}
.resp-info{
  background:var(--panel);border:1px solid var(--border);
  border-radius:6px;padding:8px 16px;
  font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;letter-spacing:1px;color:var(--muted);
}
.resp-info b{color:var(--gold);font-size:1.1rem;}

/* Mini leaderboard bars */
.mini-bars{display:flex;align-items:flex-end;gap:6px;height:60px;}
.mini-col{display:flex;flex-direction:column;align-items:center;gap:2px;}
.mini-bar{width:28px;border-radius:3px 3px 0 0;min-height:3px;transition:height .4s ease;}
.mini-name{font-size:0.55rem;color:var(--muted);max-width:32px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.next-btn{
  background:var(--red);border:none;color:#fff;
  font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;
  padding:12px 32px;border-radius:6px;cursor:pointer;transition:.2s;
  display:none;
}
.next-btn:hover{background:var(--red2);}

/* ══════════ PODIUM ══════════ */
#screen-podium{
  flex-direction:column;align-items:center;justify-content:center;
  gap:24px;padding:40px 24px;
}
#screen-podium h2{
  font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:4px;color:var(--gold);
}
.podium-wrap{display:flex;align-items:flex-end;gap:12px;}
.p-col{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:140px;}
.p-name{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;text-align:center;}
.p-score{font-size:0.8rem;color:var(--muted);}
.p-block{
  width:100%;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:2.2rem;border-radius:6px 6px 0 0;
}
.p-col:nth-child(1) .p-block{height:140px;background:linear-gradient(180deg,#aaaaaa,#666);}
.p-col:nth-child(2) .p-block{height:200px;background:linear-gradient(180deg,var(--gold),#b8860b);}
.p-col:nth-child(3) .p-block{height:110px;background:linear-gradient(180deg,#c87533,#7a4520);}

.full-board{
  width:100%;max-width:500px;
  background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;
}
.full-board h3{
  background:rgba(192,57,43,0.2);padding:10px 18px;
  font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);
}
.board-row{
  display:flex;align-items:center;gap:12px;
  padding:9px 18px;border-bottom:1px solid var(--border);
}
.board-rank{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--muted);width:24px;}
.board-name{flex:1;font-size:0.9rem;}
.board-pts{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold);}

.reset-btn{
  background:transparent;border:2px solid var(--border);color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;letter-spacing:1px;
  padding:10px 28px;border-radius:6px;cursor:pointer;transition:.2s;margin-top:8px;
}
.reset-btn:hover{border-color:var(--red);color:var(--red);}

/* Confetti */
.confetti{
  position:fixed;pointer-events:none;z-index:999;
  width:8px;height:8px;border-radius:2px;
  animation:fall linear forwards;
}
@keyframes fall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(105vh) rotate(720deg);opacity:0;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-title">RÉVOLUTION <span>BOLCHÉVIQUE</span> — PROF</div>
  <div class="topbar-right">
    <div class="pill">Élèves : <b id="student-count">0</b></div>
    <div class="pill" id="phase-pill">LOBBY</div>
  </div>
</div>

<!-- ════ LOBBY ════ -->
<div id="screen-lobby" class="screen active">
  <div class="lobby-title">☭ QUIZ — <span>RÉVOLUTION BOLCHÉVIQUE</span></div>
  <div class="lobby-grid">
    <div class="box">
      <h3>📱 QR Code — page élève</h3>
      <img id="qr-img" alt="QR Code"/>
      <div class="qr-url" id="qr-url"></div>
    </div>
    <div class="box">
      <h3>👥 Élèves connectés (<span id="lobby-count">0</span>)</h3>
      <div id="student-list"></div>
    </div>
  </div>
  <button class="start-btn" onclick="startQuiz()">▶ DÉMARRER</button>
</div>

<!-- ════ QUESTION ════ -->
<div id="screen-question" class="screen">
  <div class="q-top">
    <div class="q-label" id="q-label">QUESTION 1 / 10</div>
    <div class="timer-block">
      <div class="timer-num" id="timer-num">20</div>
      <button class="stop-btn" id="stop-btn" onclick="stopTimer()">⏹ STOP</button>
    </div>
  </div>

  <div class="timer-bar-wrap">
    <div class="timer-bar-fill" id="timer-bar"></div>
  </div>

  <div class="q-text" id="q-text">…</div>

  <div class="answers-grid">
    <div class="ans-card A"><div class="ans-fill"></div><span class="ans-lbl">A</span><span class="ans-txt" id="txt-A"></span><span class="ans-count" id="cnt-A">0</span></div>
    <div class="ans-card B"><div class="ans-fill"></div><span class="ans-lbl">B</span><span class="ans-txt" id="txt-B"></span><span class="ans-count" id="cnt-B">0</span></div>
    <div class="ans-card C"><div class="ans-fill"></div><span class="ans-lbl">C</span><span class="ans-txt" id="txt-C"></span><span class="ans-count" id="cnt-C">0</span></div>
    <div class="ans-card D"><div class="ans-fill"></div><span class="ans-lbl">D</span><span class="ans-txt" id="txt-D"></span><span class="ans-count" id="cnt-D">0</span></div>
  </div>

  <div class="q-bottom">
    <div class="resp-info">Réponses : <b id="resp-now">0</b> / <b id="resp-total">0</b></div>
    <div class="mini-bars" id="mini-bars"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">SUIVANT ▶</button>
  </div>
</div>

<!-- ════ PODIUM ════ -->
<div id="screen-podium" class="screen">
  <h2>🏆 CLASSEMENT FINAL</h2>
  <div class="podium-wrap" id="podium-wrap"></div>
  <div class="full-board">
    <h3>Scores complets</h3>
    <div id="full-board"></div>
  </div>
  <button class="reset-btn" onclick="resetQuiz()">↺ Réinitialiser le quiz</button>
</div>

<script>
// ══════════════════════════════════════════════
//  FIREBASE
// ══════════════════════════════════════════════
firebase.initializeApp({ databaseURL:"https://quiz-totalitarisme-default-rtdb.firebaseio.com/" });
const db = firebase.database();
const PATH = "rev_bolchevique";   // chemin raccourci pour éviter les conflits

// ══════════════════════════════════════════════
//  QUESTIONS BRUTES  (bonne réponse = index 0)
// ══════════════════════════════════════════════
const RAW = [
  { q:"Quel était le nom de la police secrète du régime tsariste ?",
    a:["L'Okhrana","La Tchéka","Le Komintern","La Douma"] },
  { q:"Quelle défaite militaire a déclenché l'exaspération menant à la Révolution de 1905 ?",
    a:["La défaite contre le Japon","La défaite contre l'Allemagne","La défaite contre l'Autriche","La défaite contre la France"] },
  { q:"Qu'est-ce que la « Douma » concédée par le Tsar en 1905 ?",
    a:["Une assemblée élue","La police politique","Un traité de paix","Le parti communiste"] },
  { q:"Qu'est-ce qu'un « Soviet » ?",
    a:["Conseil d'ouvriers, soldats et paysans","Un parti révolutionnaire","Une milice armée","Un tribunal populaire"] },
  { q:"Quelle est la principale différence entre bolchéviks et menchéviks ?",
    a:["Les bolchéviks voulaient une dictature immédiate du prolétariat","Les bolchéviks voulaient une révolution graduelle","Les menchéviks refusaient tout État","Les menchéviks étaient majoritaires"] },
  { q:"Quel événement déclenche la Révolution de février 1917 ?",
    a:["Une émeute de la faim","Un coup d'État militaire","L'assassinat du Tsar","Une offensive allemande"] },
  { q:"Comment Lénine est-il retourné en Russie depuis son exil ?",
    a:["Avec l'aide de l'Allemagne, via un wagon plombé","Par bateau depuis les États-Unis","Clandestinement à pied","Grâce aux menchéviks"] },
  { q:"Que réclament principalement les « Thèses d'avril » de Lénine ?",
    a:["Tous les pouvoirs aux soviets","Continuer la guerre","S'allier au gouvernement provisoire","Rejoindre les menchéviks"] },
  { q:"Que signifie l'acronyme NEP ?",
    a:["Nouvelle Politique Économique","Nouveau Parti d'État","Nouvelle Ère Prolétarienne","Nouvel Empire Populaire"] },
  { q:"Qui a remporté la lutte pour le pouvoir après la mort de Lénine en 1924 ?",
    a:["Staline","Trotsky","Kerensky","Raspoutine"] }
];

// ══════════════════════════════════════════════
//  ÉTAT
// ══════════════════════════════════════════════
let QUESTIONS = [];   // questions avec réponses mélangées
let qIdx = -1;
let timerSec = 20;
let timerInterval = null;
let timerRunning = false;
let students = {};     // uid→{name,score}
let liveAnswers = {};  // uid→answerIndex pour la question courante
const DURATION = 20;
const BAR_COLORS = ['#c0392b','#2980b9','#27ae60','#f39c12','#8e44ad','#e67e22'];

// ══════════════════════════════════════════════
//  QR CODE
// ══════════════════════════════════════════════
function setupQR() {
  const url = window.location.href.replace(/prof\.html.*$/, 'eleve.html');
  document.getElementById('qr-img').src =
    'https://api.qrserver.com/v1/create-qr-code/?size=190x190&data=' + encodeURIComponent(url);
  document.getElementById('qr-url').textContent = url;
}

// ══════════════════════════════════════════════
//  FIREBASE LISTENERS
// ══════════════════════════════════════════════
function initListeners() {
  db.ref(`${PATH}/students`).on('value', snap => {
    students = snap.val() || {};
    const n = Object.keys(students).length;
    document.getElementById('student-count').textContent = n;
    document.getElementById('lobby-count').textContent = n;
    document.getElementById('resp-total').textContent = n;
    renderStudentList();
    renderMiniBoard();
  });

  db.ref(`${PATH}/answers`).on('value', snap => {
    const all = snap.val() || {};
    liveAnswers = (qIdx >= 0 && all[qIdx]) ? all[qIdx] : {};
    const n = Object.keys(liveAnswers).length;
    document.getElementById('resp-now').textContent = n;
    if (timerRunning) updateLiveBars();
  });
}

function renderStudentList() {
  const list = document.getElementById('student-list');
  list.innerHTML = '';
  Object.values(students).forEach(s => {
    const d = document.createElement('div');
    d.className = 'chip';
    d.textContent = s.name;
    list.appendChild(d);
  });
}

// ══════════════════════════════════════════════
//  SHUFFLE  (fisher-yates)
// ══════════════════════════════════════════════
function shuffle(q) {
  const idx = [0,1,2,3];
  for (let i=3;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [idx[i],idx[j]] = [idx[j],idx[i]];
  }
  return {
    q: q.q,
    a: idx.map(i => q.a[i]),
    correct: idx.indexOf(0)   // la bonne réponse était à l'index 0
  };
}

// ══════════════════════════════════════════════
//  DÉMARRER LE QUIZ
// ══════════════════════════════════════════════
function startQuiz() {
  QUESTIONS = RAW.map(shuffle);
  // Écrire les questions dans Firebase (même ordre pour les élèves)
  db.ref(`${PATH}/questions`).set(QUESTIONS);
  // Réinitialiser les réponses et les scores
  db.ref(`${PATH}/answers`).remove();
  Object.keys(students).forEach(uid => {
    db.ref(`${PATH}/students/${uid}/score`).set(0);
  });
  showQuestion(0);
}

// ══════════════════════════════════════════════
//  AFFICHER UNE QUESTION
// ══════════════════════════════════════════════
function showQuestion(idx) {
  qIdx = idx;
  liveAnswers = {};

  const q = QUESTIONS[idx];
  document.getElementById('q-label').textContent = `QUESTION ${idx+1} / ${QUESTIONS.length}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('phase-pill').textContent = `Q${idx+1}/10`;

  const labels = ['A','B','C','D'];
  labels.forEach((l,i) => {
    document.getElementById(`txt-${l}`).textContent = q.a[i];
    document.getElementById(`cnt-${l}`).textContent = '0';
    document.getElementById(`cnt-${l}`).style.opacity = '0';
    const card = document.querySelectorAll('.ans-card')[i];
    card.classList.remove('correct','wrong');
    card.querySelector('.ans-fill').style.width = '0%';
  });

  document.getElementById('resp-now').textContent = '0';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display = '';

  // Effacer les anciennes réponses pour cette question
  db.ref(`${PATH}/answers/${idx}`).remove();

  // Notifier les élèves
  db.ref(`${PATH}/gameState`).set({
    phase: 'question',
    questionIndex: idx,
    serverTime: firebase.database.ServerValue.TIMESTAMP
  });

  showScreen('screen-question');
  startTimer();
}

// ══════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerSec = DURATION;
  timerRunning = true;
  updateTimerUI();
  timerInterval = setInterval(() => {
    timerSec--;
    updateTimerUI();
    if (timerSec <= 0) stopTimer();
  }, 1000);
}

function updateTimerUI() {
  const el = document.getElementById('timer-num');
  const bar = document.getElementById('timer-bar');
  el.textContent = timerSec;
  el.className = 'timer-num' +
    (timerSec <= 5 ? ' danger' : timerSec <= 10 ? ' warn' : '');
  const pct = (timerSec / DURATION) * 100;
  bar.style.width = pct + '%';
  bar.style.background = timerSec <= 5 ? '#c0392b' : timerSec <= 10 ? '#e67e22' : '#f39c12';
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerRunning = false;
  document.getElementById('stop-btn').style.display = 'none';
  revealAnswers();
}

// ══════════════════════════════════════════════
//  REVEAL
// ══════════════════════════════════════════════
function revealAnswers() {
  db.ref(`${PATH}/gameState`).update({ phase: 'reveal' });

  const q = QUESTIONS[qIdx];
  const counts = [0,0,0,0];
  Object.values(liveAnswers).forEach(a => { if (a>=0&&a<4) counts[a]++; });
  const total = Math.max(1, counts.reduce((s,n)=>s+n,0));

  const labels = ['A','B','C','D'];
  labels.forEach((l,i) => {
    const card = document.querySelectorAll('.ans-card')[i];
    const pct = (counts[i]/total*100).toFixed(0);
    card.querySelector('.ans-fill').style.width = pct + '%';
    const cnt = document.getElementById(`cnt-${l}`);
    cnt.textContent = counts[i];
    cnt.style.opacity = '1';
    if (i === q.correct) card.classList.add('correct');
    else card.classList.add('wrong');
  });

  document.getElementById('next-btn').style.display = '';

  // Attribuer les points
  const updates = {};
  Object.entries(liveAnswers).forEach(([uid, ans]) => {
    if (parseInt(ans) === q.correct && students[uid]) {
      const cur = students[uid].score || 0;
      updates[`${PATH}/students/${uid}/score`] = cur + 100;
    }
  });
  if (Object.keys(updates).length) db.ref().update(updates);
}

// ══════════════════════════════════════════════
//  BARRES EN DIRECT
// ══════════════════════════════════════════════
function updateLiveBars() {
  const counts = [0,0,0,0];
  Object.values(liveAnswers).forEach(a => { if(a>=0&&a<4) counts[a]++; });
  const total = Math.max(1, Object.keys(liveAnswers).length);
  document.querySelectorAll('.ans-card').forEach((card,i) => {
    const pct = (counts[i]/total*100).toFixed(0);
    card.querySelector('.ans-fill').style.width = pct + '%';
  });
}

// ══════════════════════════════════════════════
//  MINI BOARD
// ══════════════════════════════════════════════
function renderMiniBoard() {
  const sorted = Object.values(students)
    .sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,6);
  const max = Math.max(1, sorted[0]?.score||1);
  const mini = document.getElementById('mini-bars');
  mini.innerHTML = '';
  sorted.forEach((s,i) => {
    const h = Math.max(3, ((s.score||0)/max)*54);
    mini.innerHTML += `<div class="mini-col">
      <div class="mini-bar" style="height:${h}px;background:${BAR_COLORS[i]}"></div>
      <div class="mini-name">${s.name||'?'}</div>
    </div>`;
  });
}

// ══════════════════════════════════════════════
//  SUIVANT / PODIUM
// ══════════════════════════════════════════════
function nextQuestion() {
  const next = qIdx + 1;
  if (next >= QUESTIONS.length) showPodium();
  else showQuestion(next);
}

// ══════════════════════════════════════════════
//  PODIUM
// ══════════════════════════════════════════════
function showPodium() {
  db.ref(`${PATH}/gameState`).set({ phase:'podium' });
  showScreen('screen-podium');
  document.getElementById('phase-pill').textContent = 'FIN';

  const sorted = Object.values(students)
    .map(s=>({name:s.name||'?',score:s.score||0}))
    .sort((a,b)=>b.score-a.score);

  // Podium visuel : 2ème, 1er, 3ème
  const order = [sorted[1], sorted[0], sorted[2]].filter(Boolean);
  const medals = ['🥈','🥇','🥉'];
  const podium = document.getElementById('podium-wrap');
  podium.innerHTML = '';
  order.forEach((s,i) => {
    podium.innerHTML += `<div class="p-col">
      <div class="p-name">${s.name}</div>
      <div class="p-score">${s.score} pts</div>
      <div class="p-block">${medals[i]}</div>
    </div>`;
  });

  // Liste complète
  const board = document.getElementById('full-board');
  board.innerHTML = '';
  sorted.forEach((s,i) => {
    board.innerHTML += `<div class="board-row">
      <div class="board-rank">${i+1}</div>
      <div class="board-name">${s.name}</div>
      <div class="board-pts">${s.score}</div>
    </div>`;
  });

  launchConfetti();
}

// ══════════════════════════════════════════════
//  RESET
// ══════════════════════════════════════════════
function resetQuiz() {
  if (!confirm('Réinitialiser complètement le quiz ?')) return;
  db.ref(PATH).set({ gameState:{ phase:'reset' } }).then(() => location.reload());
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function launchConfetti() {
  const colors=['#d4af37','#c0392b','#e74c3c','#f39c12','#27ae60','#2980b9'];
  for(let i=0;i<90;i++){
    const el=document.createElement('div');
    el.className='confetti';
    el.style.cssText=`left:${Math.random()*100}vw;top:0;
      background:${colors[i%colors.length]};
      animation-duration:${1.8+Math.random()*2}s;
      animation-delay:${Math.random()*1.5}s;
      width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;
      transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  setupQR();
  initListeners();
  // Nettoyer l'état précédent mais garder les élèves s'il y en a
  db.ref(`${PATH}/gameState`).set({ phase:'lobby' });
  db.ref(`${PATH}/answers`).remove();
  db.ref(`${PATH}/questions`).remove();
});
</script>
</body>
